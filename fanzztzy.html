  20% { text-shadow: -2px 0 red, 2px 0 blue; }
  40% { text-shadow: 2px 2px red, -2px -2px blue; }

<script>
function togglePass(el) {
  let pass = el.parentElement.parentElement.querySelector(".pass");
  if (pass.innerText.includes("*")) {
    pass.innerText = pass.dataset.real;
  } else {
    pass.dataset.real = pass.innerText;
    pass.innerText = "******";
  }
}

function copyText(text) {
  navigator.clipboard.writeText(text);
  alert("Disalin: " + text);
}

/* BINTANG */
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];

for (let i = 0; i < 120; i++) {
  stars.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    r: Math.random()*2
  });
}

function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = "white";
  stars.forEach(s => {
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctx.fill();
    s.y += 0.4;
    if (s.y > canvas.height) s.y = 0;
  });
  requestAnimationFrame(draw);
}
draw();
</script>
